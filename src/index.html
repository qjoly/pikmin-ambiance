<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Ambience</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
    
    <meta name="title" content="Pikmin Ambience">
    <meta name="description" content="Relaxing, highly spaced ambient sounds inspired by Pikmin. Awaken the Pikmin and enjoy peaceful background sounds.">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://qjoly.github.io/pikmin-ambiance/">
    <meta property="og:title" content="Pikmin Ambience">
    <meta property="og:description" content="Relaxing, highly spaced ambient sounds inspired by Pikmin. Awaken the Pikmin and enjoy peaceful background sounds.">
    <meta property="og:image" content="https://qjoly.github.io/pikmin-ambiance/preview.png">
    
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://qjoly.github.io/pikmin-ambiance/">
    <meta property="twitter:title" content="Pikmin Ambience">
    <meta property="twitter:description" content="Relaxing, highly spaced ambient sounds inspired by Pikmin. Awaken the Pikmin and enjoy peaceful background sounds.">
    <meta property="twitter:image" content="https://qjoly.github.io/pikmin-ambiance/preview.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2d6a4f;
            --accent-color: #52b788;
            --bg-gradient-1: #d8f3dc;
            --bg-gradient-2: #95d5b2;
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #1b4332;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            margin-top: 0;
            font-weight: 900;
            font-size: 2rem;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            margin-bottom: 20px;
            font-size: 1rem;
            color: var(--text-main);
            opacity: 0.8;
        }

        /* Volume Control Area */
        .volume-container {
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .volume-container label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        /* Delay Control Area */
        .delay-container {
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .delay-container .delay-title {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .delay-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .delay-row:last-child {
            margin-bottom: 0;
        }

        .delay-row label {
            font-size: 0.85rem;
            font-weight: 700;
            min-width: 40px;
            text-align: left;
        }

        .delay-row input[type=range] {
            flex: 1;
        }

        .delay-row .delay-value {
            font-size: 0.85rem;
            font-weight: 700;
            min-width: 52px;
            text-align: right;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        
        input[type=range]:focus {
            outline: none;
        }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #a4c3b2;
            border-radius: 4px;
        }
        
        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(82, 183, 136, 0.4);
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45, 106, 79, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: #a4c3b2;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #testBtn {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            box-shadow: none;
            padding: 10px 24px;
            font-size: 1rem;
        }

        #testBtn:hover {
            background-color: rgba(45, 106, 79, 0.1);
            transform: translateY(-1px);
        }

        #status {
            margin-top: 25px;
            font-weight: 700;
            font-size: 1.05rem;
            height: 24px;
        }

        .pikmin-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.75);
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 50;
        }

        .pikmin-overlay.visible {
            opacity: 1;
            transform: scale(1);
        }

        .pikmin-overlay img {
            width: min(70vw, 550px);
            max-height: 80vh;
            object-fit: contain;
            filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.35));
        }
    </style>
</head>
<body>

    <div id="pikminOverlay" class="pikmin-overlay" aria-hidden="true">
        <img src="https://pikmin.wiki.gallery/images/thumb/5/56/P4_Red_Pikmin.png/150px-P4_Red_Pikmin.png" alt="Large red Pikmin">
    </div>

    <div class="container">
        <h1>🌱 Pikmin Ambience</h1>
        <p class="subtitle">Relaxing, highly spaced ambient sounds.</p>
        
        <div class="volume-container">
            <label for="volumeSlider">Volume: <span id="volumeLabel">50%</span></label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div class="delay-container">
            <span class="delay-title">Delay between sounds</span>
            <div class="delay-row">
                <label for="minDelaySlider">Min</label>
                <input type="range" id="minDelaySlider" min="1" max="60" step="1" value="20">
                <span class="delay-value"><span id="minDelayLabel">20</span> min</span>
            </div>
            <div class="delay-row">
                <label for="maxDelaySlider">Max</label>
                <input type="range" id="maxDelaySlider" min="1" max="60" step="1" value="30">
                <span class="delay-value"><span id="maxDelayLabel">30</span> min</span>
            </div>
        </div>

        <div class="button-group">
            <button id="testBtn">Test Volume</button>
            <button id="startBtn">Awaken Pikmin</button>
        </div>
        
        <div id="status">Waiting for input...</div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const soundFiles = [
            'sounds/throw.mp3',
            'sounds/death.mp3',
            'sounds/greet.mp3'
        ];
        
        const MAX_PLAYS = 2; // Max plays per time window

        // TIME_WINDOW_MS is derived from minDelay: window = minDelay * MAX_PLAYS
        // This is computed dynamically below once delays are loaded.

        // --- LOGIC ---
        const playHistory = {}; 
        
        // UI Elements
        const startBtn = document.getElementById('startBtn');
        const testBtn = document.getElementById('testBtn');
        const statusDiv = document.getElementById('status');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeLabel = document.getElementById('volumeLabel');
        const pikminOverlay = document.getElementById('pikminOverlay');
        const minDelaySlider = document.getElementById('minDelaySlider');
        const maxDelaySlider = document.getElementById('maxDelaySlider');
        const minDelayLabel = document.getElementById('minDelayLabel');
        const maxDelayLabel = document.getElementById('maxDelayLabel');

        let hidePikminTimeout;

        // Initialize volume from browser storage (default to 0.5 if not found)
        let savedVolume = localStorage.getItem('pikminVolume');
        let currentVolume = savedVolume !== null ? parseFloat(savedVolume) : 0.5;
        
        // Update slider and label on load
        volumeSlider.value = currentVolume;
        volumeLabel.innerText = Math.round(currentVolume * 100) + '%';

        // Initialize min/max delay from browser storage (stored in seconds, displayed in minutes, defaults: 20 and 30 minutes)
        // Values in localStorage are in seconds — the slider shows minutes but internal logic uses seconds directly.
        let savedMinDelay = localStorage.getItem('pikminMinDelay');
        let savedMaxDelay = localStorage.getItem('pikminMaxDelay');
        // currentMinDelaySec / currentMaxDelaySec are in seconds
        let currentMinDelaySec = savedMinDelay !== null ? parseInt(savedMinDelay) : 20 * 60;
        let currentMaxDelaySec = savedMaxDelay !== null ? parseInt(savedMaxDelay) : 30 * 60;

        // Slider shows minutes (rounded for display, but storage is in seconds)
        minDelaySlider.value = Math.max(1, Math.round(currentMinDelaySec / 60));
        maxDelaySlider.value = Math.max(1, Math.round(currentMaxDelaySec / 60));
        minDelayLabel.innerText = Math.max(1, Math.round(currentMinDelaySec / 60));
        maxDelayLabel.innerText = Math.max(1, Math.round(currentMaxDelaySec / 60));

        // Function to log exclusively to the browser console
        function logToConsole(message) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            console.log(`[${time}] ${message}`);
        }

        function showHugePikmin() {
            clearTimeout(hidePikminTimeout);
            pikminOverlay.classList.add('visible');

            hidePikminTimeout = setTimeout(() => {
                pikminOverlay.classList.remove('visible');
            }, 2200);
        }

        // Handle Volume Changes
        volumeSlider.addEventListener('input', (event) => {
            currentVolume = parseFloat(event.target.value);
            volumeLabel.innerText = Math.round(currentVolume * 100) + '%';
            
            // Save the new volume to browser storage
            localStorage.setItem('pikminVolume', currentVolume);
        });

        // Handle Min Delay Changes
        minDelaySlider.addEventListener('input', () => {
            const minMinutes = parseInt(minDelaySlider.value);
            currentMinDelaySec = minMinutes * 60;
            if (currentMinDelaySec > currentMaxDelaySec) {
                currentMaxDelaySec = currentMinDelaySec;
                maxDelaySlider.value = minMinutes;
                maxDelayLabel.innerText = minMinutes;
                localStorage.setItem('pikminMaxDelay', currentMaxDelaySec);
            }
            minDelayLabel.innerText = minMinutes;
            localStorage.setItem('pikminMinDelay', currentMinDelaySec);
        });

        // Handle Max Delay Changes
        maxDelaySlider.addEventListener('input', () => {
            const maxMinutes = parseInt(maxDelaySlider.value);
            currentMaxDelaySec = maxMinutes * 60;
            if (currentMaxDelaySec < currentMinDelaySec) {
                currentMinDelaySec = currentMaxDelaySec;
                minDelaySlider.value = maxMinutes;
                minDelayLabel.innerText = maxMinutes;
                localStorage.setItem('pikminMinDelay', currentMinDelaySec);
            }
            maxDelayLabel.innerText = maxMinutes;
            localStorage.setItem('pikminMaxDelay', currentMaxDelaySec);
        });

        // Test Sound Button (Bypasses timers)
        testBtn.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * soundFiles.length);
            const testSound = soundFiles[randomIndex];
            
            const audio = new Audio(testSound);
            audio.volume = currentVolume; 
            
            audio.play().catch(e => logToConsole(`Test playback error: ${testSound.split('/').pop()}`));
            showHugePikmin();
            logToConsole(`🔊 Test sound played: ${testSound.split('/').pop()} at ${Math.round(currentVolume * 100)}% volume`);
        });

        function getAvailableSounds() {
            const now = Date.now();
            // TIME_WINDOW_MS adapts to user config: window = minDelay * MAX_PLAYS
            const timeWindowMs = currentMinDelaySec * MAX_PLAYS * 1000;
            const available = [];

            soundFiles.forEach(sound => {
                if (!playHistory[sound]) {
                    playHistory[sound] = [];
                }
                // Remove timestamps older than the time window
                playHistory[sound] = playHistory[sound].filter(timestamp => (now - timestamp) <= timeWindowMs);
                
                // Keep sound if it hasn't reached the max plays in the time window
                if (playHistory[sound].length < MAX_PLAYS) {
                    available.push(sound);
                }
            });

            return available;
        }

        function playRandomSound() {
            const availableSounds = getAvailableSounds();

            if (availableSounds.length > 0) {
                const randomIndex = Math.floor(Math.random() * availableSounds.length);
                const selectedSound = availableSounds[randomIndex];

                const audio = new Audio(selectedSound);
                audio.volume = currentVolume; // Apply current slider volume
                audio.play().catch(e => logToConsole(`Playback error: ${selectedSound.split('/').pop()}`));
                showHugePikmin();

                playHistory[selectedSound].push(Date.now());
                logToConsole(`🎵 Played: ${selectedSound.split('/').pop()}`);
            } else {
                logToConsole(`⏳ Skipped: Play limits reached for all sounds.`);
            }

            // Schedule the next sound
            const minMs = currentMinDelaySec * 1000;
            const maxMs = currentMaxDelaySec * 1000;
            const nextDelay = Math.floor(Math.random() * (maxMs - minMs + 1)) + minMs;
            const nextDelaySec = nextDelay / 1000;
            if (nextDelaySec < 60) {
                logToConsole(`Next sound in ${nextDelaySec.toFixed(0)}s...`);
            } else {
                logToConsole(`Next sound in ${(nextDelaySec / 60).toFixed(1)} minutes...`);
            }
            setTimeout(playRandomSound, nextDelay);
        }

        startBtn.addEventListener('click', () => {
            startBtn.disabled = true;
            startBtn.innerText = "Listening...";
            
            // Disable the test button so user doesn't interrupt the zen once it starts
            testBtn.disabled = true; 
            testBtn.style.opacity = '0.5';
            
            statusDiv.innerHTML = "✨ Pikmin are exploring in silence...";
            logToConsole("Ecosystem started.");
            
            // Play the very first sound immediately, then start the 20-30 min loop
            playRandomSound();
        });
    </script>
</body>
</html>
