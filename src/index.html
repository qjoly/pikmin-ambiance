<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Ambience</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
    
    <meta name="title" content="Pikmin Ambience">
    <meta name="description" content="Relaxing, highly spaced ambient sounds inspired by Pikmin. Awaken the Pikmin and enjoy peaceful background sounds.">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://qjoly.github.io/pikmin-ambiance/">
    <meta property="og:title" content="Pikmin Ambience">
    <meta property="og:description" content="Relaxing, highly spaced ambient sounds inspired by Pikmin. Awaken the Pikmin and enjoy peaceful background sounds.">
    <meta property="og:image" content="https://qjoly.github.io/pikmin-ambiance/preview.png">
    
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://qjoly.github.io/pikmin-ambiance/">
    <meta property="twitter:title" content="Pikmin Ambience">
    <meta property="twitter:description" content="Relaxing, highly spaced ambient sounds inspired by Pikmin. Awaken the Pikmin and enjoy peaceful background sounds.">
    <meta property="twitter:image" content="https://qjoly.github.io/pikmin-ambiance/preview.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2d6a4f;
            --accent-color: #52b788;
            --bg-gradient-1: #d8f3dc;
            --bg-gradient-2: #95d5b2;
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #1b4332;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            margin-top: 0;
            font-weight: 900;
            font-size: 2rem;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            margin-bottom: 20px;
            font-size: 1rem;
            color: var(--text-main);
            opacity: 0.8;
        }

        /* Volume Control Area */
        .volume-container {
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .volume-container label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        
        input[type=range]:focus {
            outline: none;
        }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #a4c3b2;
            border-radius: 4px;
        }
        
        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(82, 183, 136, 0.4);
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45, 106, 79, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: #a4c3b2;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #testBtn {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            box-shadow: none;
            padding: 10px 24px;
            font-size: 1rem;
        }

        #testBtn:hover {
            background-color: rgba(45, 106, 79, 0.1);
            transform: translateY(-1px);
        }

        #status {
            margin-top: 25px;
            font-weight: 700;
            font-size: 1.05rem;
            height: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌱 Pikmin Ambience</h1>
        <p class="subtitle">Relaxing, highly spaced ambient sounds.</p>
        
        <div class="volume-container">
            <label for="volumeSlider">Volume: <span id="volumeLabel">50%</span></label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div class="button-group">
            <button id="testBtn">Test Volume</button>
            <button id="startBtn">Awaken Pikmin</button>
        </div>
        
        <div id="status">Waiting for input...</div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const soundFiles = [
            'sounds/throw.mp3',
            'sounds/death.mp3',
            'sounds/greet.mp3'
        ];
        
        const TIME_WINDOW_MS = 10 * 60 * 1000; // 10 minutes limit window
        const MAX_PLAYS = 2; // Max 2 plays per 10 minutes

        // Sounds play randomly between 20 and 30 minutes
        const MIN_INTERVAL = 20 * 60 * 1000; // 20 minutes
        const MAX_INTERVAL = 30 * 60 * 1000; // 30 minutes

        // --- LOGIC ---
        const playHistory = {}; 
        let currentVolume = 0.5; // Default volume (50%)

        const startBtn = document.getElementById('startBtn');
        const testBtn = document.getElementById('testBtn');
        const statusDiv = document.getElementById('status');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeLabel = document.getElementById('volumeLabel');

        // Function to log exclusively to the browser console
        function logToConsole(message) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            console.log(`[${time}] ${message}`);
        }

        // Handle Volume Changes
        volumeSlider.addEventListener('input', (event) => {
            currentVolume = parseFloat(event.target.value);
            volumeLabel.innerText = Math.round(currentVolume * 100) + '%';
        });

        // Test Sound Button (Bypasses timers)
        testBtn.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * soundFiles.length);
            const testSound = soundFiles[randomIndex];
            
            const audio = new Audio(testSound);
            audio.volume = currentVolume; 
            
            audio.play().catch(e => logToConsole(`Test playback error: ${testSound.split('/').pop()}`));
            logToConsole(`🔊 Test sound played: ${testSound.split('/').pop()} at ${Math.round(currentVolume * 100)}% volume`);
        });

        function getAvailableSounds() {
            const now = Date.now();
            const available = [];

            soundFiles.forEach(sound => {
                if (!playHistory[sound]) {
                    playHistory[sound] = [];
                }
                // Remove timestamps older than the time window
                playHistory[sound] = playHistory[sound].filter(timestamp => (now - timestamp) <= TIME_WINDOW_MS);
                
                // Keep sound if it hasn't reached the max plays in the time window
                if (playHistory[sound].length < MAX_PLAYS) {
                    available.push(sound);
                }
            });

            return available;
        }

        function playRandomSound() {
            const availableSounds = getAvailableSounds();

            if (availableSounds.length > 0) {
                const randomIndex = Math.floor(Math.random() * availableSounds.length);
                const selectedSound = availableSounds[randomIndex];

                const audio = new Audio(selectedSound);
                audio.volume = currentVolume; // Apply current slider volume
                audio.play().catch(e => logToConsole(`Playback error: ${selectedSound.split('/').pop()}`));

                playHistory[selectedSound].push(Date.now());
                logToConsole(`🎵 Played: ${selectedSound.split('/').pop()}`);
            } else {
                logToConsole(`⏳ Skipped: Play limits reached for all sounds.`);
            }

            // Schedule the next sound and log the delay in minutes
            const nextDelay = Math.floor(Math.random() * (MAX_INTERVAL - MIN_INTERVAL + 1)) + MIN_INTERVAL;
            logToConsole(`Next sound in ${(nextDelay / 60000).toFixed(1)} minutes...`);
            setTimeout(playRandomSound, nextDelay);
        }

        startBtn.addEventListener('click', () => {
            startBtn.disabled = true;
            startBtn.innerText = "Listening...";
            
            // Disable the test button so user doesn't interrupt the zen once it starts
            testBtn.disabled = true; 
            testBtn.style.opacity = '0.5';
            
            statusDiv.innerHTML = "✨ Pikmin are exploring in silence...";
            logToConsole("Ecosystem started.");
            
            // Play the very first sound immediately, then start the 20-30 min loop
            playRandomSound();
        });
    </script>
</body>
</html>
