<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Ambience</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for easy color management */
        :root {
            --primary-color: #2d6a4f;
            --accent-color: #52b788;
            --bg-gradient-1: #d8f3dc;
            --bg-gradient-2: #95d5b2;
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #1b4332;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            color: var(--text-main);
            overflow: hidden;
        }

        /* Glassmorphism Card Container */
        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            margin-top: 0;
            font-weight: 900;
            font-size: 2rem;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            margin-bottom: 30px;
            font-size: 1rem;
            color: var(--text-main);
            opacity: 0.8;
        }

        /* Styled Button */
        button {
            background-color: var(--accent-color);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(82, 183, 136, 0.4);
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45, 106, 79, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: #a4c3b2;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Status & Log Area */
        #status {
            margin-top: 25px;
            font-weight: 700;
            font-size: 1.05rem;
            height: 24px;
        }

        #log {
            margin-top: 15px;
            height: 160px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            font-size: 0.9rem;
            text-align: left;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }

        /* Custom Scrollbar for the Log */
        #log::-webkit-scrollbar {
            width: 8px;
        }
        #log::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        #log::-webkit-scrollbar-thumb {
            background: rgba(82, 183, 136, 0.5);
            border-radius: 10px;
        }
        #log::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }

        .log-entry {
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 4px;
        }
        .log-time {
            font-size: 0.8rem;
            color: var(--primary-color);
            opacity: 0.7;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌱 Pikmin Ambience</h1>
        <p class="subtitle">Relaxing background sounds, strictly regulated.</p>
        
        <button id="startBtn">Awaken Pikmin</button>
        
        <div id="status">Waiting for input...</div>
        <div id="log"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const soundFiles = [
            'sounds/throw.mp3',
            'sounds/death.mp3',
            'sounds/greet.mp3',
        ];
        
        const TIME_WINDOW_MS = 10 * 60 * 1000; 
        const MAX_PLAYS = 2; 

        // Sound plays between every 10 to 30 seconds
        const MIN_INTERVAL = 10000; 
        const MAX_INTERVAL = 30000; 

        // --- LOGIC ---
        const playHistory = {}; 
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');

        function addLog(message) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const logHTML = `<div class="log-entry"><span class="log-time">[${time}]</span> ${message}</div>`;
            logDiv.innerHTML = logHTML + logDiv.innerHTML;
        }

        function getAvailableSounds() {
            const now = Date.now();
            const available = [];

            soundFiles.forEach(sound => {
                if (!playHistory[sound]) {
                    playHistory[sound] = [];
                }
                playHistory[sound] = playHistory[sound].filter(timestamp => (now - timestamp) <= TIME_WINDOW_MS);
                if (playHistory[sound].length < MAX_PLAYS) {
                    available.push(sound);
                }
            });

            return available;
        }

        function playRandomSound() {
            const availableSounds = getAvailableSounds();

            if (availableSounds.length > 0) {
                const randomIndex = Math.floor(Math.random() * availableSounds.length);
                const selectedSound = availableSounds[randomIndex];

                const audio = new Audio(selectedSound);
                audio.play().catch(e => addLog(`<em>Error playing ${selectedSound.split('/').pop()}</em>`));

                playHistory[selectedSound].push(Date.now());
                addLog(`🎵 Played: <strong>${selectedSound.split('/').pop()}</strong>`);
            } else {
                addLog(`⏳ Skipped: Limits reached for all sounds.`);
            }

            const nextDelay = Math.floor(Math.random() * (MAX_INTERVAL - MIN_INTERVAL + 1)) + MIN_INTERVAL;
            setTimeout(playRandomSound, nextDelay);
        }

        startBtn.addEventListener('click', () => {
            startBtn.disabled = true;
            startBtn.innerText = "Listening...";
            statusDiv.innerHTML = "✨ Pikmin are exploring nearby...";
            addLog("Ecosystem started.");
            
            playRandomSound();
        });
    </script>
</body>
</html>
